name: Bug report
description: Something in Pippin isn't working the way it should
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much as you can — the platform and version fields are the ones we always need to reproduce a problem.

        If you reached this form from inside the app, the platform and version fields are already filled in for you.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I do X, Pippin does Y instead of Z.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: I expected Pippin to…
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we make this happen ourselves?
      placeholder: |
        1. Go to…
        2. Tap on…
        3. See the error
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which platform are you seeing this on?
      options:
        - iOS (iPhone)
        - iPadOS (iPad)
        - macOS (Mac)
        - tvOS (Apple TV)
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: Pippin version
      description: Find this in Settings → About. If you came from inside the app this is filled in for you.
      placeholder: e.g. 1.0.3 (42)
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS version
      description: The version of iOS / iPadOS / macOS / tvOS you're running.
      placeholder: e.g. iOS 18.5
    validations:
      required: true

  - type: dropdown
    id: server
    attributes:
      label: Media server
      description: Which server were you connected to when this happened?
      options:
        - Plex
        - Jellyfin
        - Both / either
        - Not applicable
    validations:
      required: true

  - type: input
    id: server-version
    attributes:
      label: Server version
      description: The version of Plex Media Server or Jellyfin, if relevant.
      placeholder: e.g. Jellyfin 10.9.11
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: |
        If you can, attach a screenshot or export logs from Settings → Logs. Drag files in or paste them here.
        Log text will be automatically formatted, so no need for backticks.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this hasn't been reported already
          required: true
        - label: I'm on the latest version of Pippin available to me
          required: false
